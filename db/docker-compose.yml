services:

# +--------------------+
# |       MYSQL        |
# +--------------------+
  mysql:
    image: mysql:8.3
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pwd
      MYSQL_DATABASE: digital_hunter
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db_setup/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    restart: unless-stopped


volumes:
  mysql_data:
